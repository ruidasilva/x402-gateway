services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  x402-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8402}:${PORT:-8402}"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      # Browser-accessible URL for the dashboard config endpoint
      DELEGATOR_URL: "http://localhost:${DELEGATOR_PORT:-8403}"
      # Server-side URL for the delegate proxy (Docker internal network)
      DELEGATOR_INTERNAL_URL: "http://x402-delegator:${DELEGATOR_PORT:-8403}"
      # Developer Playground reverse proxy target
      # Use host.docker.internal to reach playground running on host Mac
      PLAYGROUND_URL: "http://host.docker.internal:3000"
    restart: unless-stopped

  x402-delegator:
    build:
      context: .
      dockerfile: Dockerfile.delegator
    ports:
      - "${DELEGATOR_PORT:-8403}:${DELEGATOR_PORT:-8403}"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      PORT: "${DELEGATOR_PORT:-8403}"
    restart: unless-stopped

  x402-playground:
    build:
      context: ./x-402-examples-workspace
      dockerfile: Dockerfile
    # Port exposed only on Docker network; gateway proxies via /playground/
    # Uncomment to access directly: ports: ["${PLAYGROUND_PORT:-3001}:3000"]
    env_file: .env
    environment:
      PORT: "3000"
      PLAYGROUND_BASE_PATH: "/playground"
    restart: unless-stopped

volumes:
  redis_data:
