name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # cmd/server embeds static/*; CI has no dashboard build here, so add a placeholder
      - name: Placeholder for embed
        run: mkdir -p cmd/server/static && echo '<!DOCTYPE html><html><head><title>x402</title></head><body></body></html>' > cmd/server/static/index.html

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        working-directory: dashboard
        run: npm ci

      - name: Type-check & build
        working-directory: dashboard
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -t x402-gateway:ci .

      - name: Build delegator image
        run: docker build -f Dockerfile.delegator -t x402-delegator:ci .
